<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <title>Admin Console - CountUp</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/css/global.css" rel="stylesheet"/>
    <link href="/css/home-sidebar.css" rel="stylesheet"/>
    <link href="/css/home-main.css" rel="stylesheet"/> <link href="/css/admin.css" rel="stylesheet"/>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body id="page-top">

<div id="notification-area" class="notification-hidden">
    <div class="notification-content">
        <i id="notification-icon" class="fas fa-check-circle"></i>
        <span id="notification-message">Message goes here</span>
    </div>
</div>

<div data-hx-trigger="load" data-hx-swap="outerHTML" data-hx-get="/home-sidebar"></div>

<div class="main">
    <div class="dashboard-header">
        <div>
            <div class="dashboard-header__title">Administration</div>
            <h2 class="dashboard-header__current-month">User Management</h2>
        </div>
    </div>

    <div class="window-container --delete-users">
        <div class="window-container__header">
            <h3 class="window-container__title text-danger">Danger Zone</h3>
            <i class="fas fa-exclamation-triangle text-danger"></i>
        </div>

        <div class="p-4">
            <p class="text-muted mb-4">
                This action cannot be undone. It will permanently delete the user's account,
                all associated budget lines, and share portfolio data.
            </p>

            <form id="delete-user-form">
                <div class="form-group mb-4">
                    <label for="userEmail" class="modal-form__label">Target User Email</label>
                    <input type="email" name="userEmail" id="userEmail" class="modal-form__input"
                           placeholder="user@example.com" required>
                </div>

                <button type="submit" class="btn btn-danger w-100 p-3 fw-bold">
                    <i class="fas fa-trash-alt me-2"></i> Permanently Delete User
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/home-sidebar.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
