<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <title>Dashboard - CountUp</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/css/global.css" rel="stylesheet"/>
    <link href="/css/home-sidebar.css" rel="stylesheet"/>
    <link href="/css/home-main.css" rel="stylesheet"/>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body id="page-top">

<div data-hx-trigger="load" data-hx-swap="outerHTML" data-hx-get="/home-sidebar"></div>

<div class="main">
    <header class="dashboard-header">
        <div>
            <div class="dashboard-header__title">Overview</div>
            <h2 class="dashboard-header__current-month">
                Today: <span th:text="${currentDate}">Jan 19, 2026</span>
            </h2>
        </div>
        <button class="btn-primary-custom">
            <i class="fas fa-download me-2"></i> Generate Report
        </button>
    </header>

    <div class="dashboard-cards">
        <div class="card">
            <h3 class="card__title">Monthly Earnings</h3>
            <p class="card__value text-success">$ <span th:text="${monthlyBalance}">0.00</span></p>
        </div>
        <div class="card">
            <h3 class="card__title">Annual Earnings</h3>
            <p class="card__value">$ <span th:text="${annualBalance}">0.00</span></p>
        </div>
        <div class="card">
            <h3 class="card__title">YoY Growth</h3>
            <p class="card__value">% <span th:text="${yearToYear}">0</span></p>
        </div>
        <div class="card">
            <h3 class="card__title">Net Worth</h3>
            <p class="card__value">$ <span th:text="${allTimeBalance}">0.00</span></p>
        </div>
    </div>

    <div class="windows-section">
        <div class="window-container">
            <div class="window-container__header">
                <h3 class="window-container__title">Recent Profits</h3>
                <i class="fas fa-arrow-trend-up text-success"></i>
            </div>
            <div class="scrollable-list">
                <table class="table" id="profits-table">
                    <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="window-container__footer">
                <button type="button" class="btn-add-item" data-bs-toggle="modal" data-bs-target="#add-profit-modal">
                    <i class="fas fa-plus"></i> Add Profit
                </button>
            </div>
        </div>

        <div class="window-container">
            <div class="window-container__header">
                <h3 class="window-container__title">Recent Expenses</h3>
                <i class="fas fa-arrow-trend-down text-danger"></i>
            </div>
            <div class="scrollable-list">
                <table class="table" id="losses-table">
                    <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="window-container__footer">
                <button class="btn-add-item" data-bs-toggle="modal" data-bs-target="#add-expanse-modal">
                    <i class="fas fa-plus"></i> Add Expense
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="add-profit-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Add New Profit</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/AddBudgetItem}" method="post" id="add-profit">
                    <div class="modal-body">
                        <div class="modal-form__group">
                            <label class="modal-form__label">Description</label>
                            <input type="text" name="description" class="modal-form__input" required placeholder="e.g. Freelance Project">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Amount ($)</label>
                            <input type="number" step="0.01" name="amount" class="modal-form__input" required placeholder="0.00">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Date</label>
                            <input type="date" name="date" class="modal-form__input">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Category</label>
                            <select name="category" id="profit-category" class="modal-form__input" required onchange="toggleNewCategoryInput(this, 'profit')">
                                <option value="Uncategorized">Uncategorized</option>
                                <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                                <option value="Other">+ Add New Category</option>
                            </select>
                        </div>
                        <div class="modal-form__group" id="new-category-group-profit" style="display: none;">
                            <label class="modal-form__label">New Category Name</label>
                            <input type="text" name="new-category" id="new-category-profit" class="modal-form__input">
                        </div>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="type" value="profit">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-close-modal" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-save-changes-modal">Save Profit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="add-expanse-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Add New Expense</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/AddBudgetItem}" method="post" id="add-loss">
                    <div class="modal-body">
                        <div class="modal-form__group">
                            <label class="modal-form__label">Description</label>
                            <input type="text" name="description" class="modal-form__input" required placeholder="e.g. Grocery Run">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Amount ($)</label>
                            <input type="number" step="0.01" name="amount" class="modal-form__input" required placeholder="0.00">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Date</label>
                            <input type="date" name="date" class="modal-form__input">
                        </div>
                        <div class="modal-form__group">
                            <label class="modal-form__label">Category</label>
                            <select name="category" id="loss-category" class="modal-form__input" required onchange="toggleNewCategoryInput(this, 'loss')">
                                <option value="Uncategorized">Uncategorized</option>
                                <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                                <option value="Other">+ Add New Category</option>
                            </select>
                        </div>
                        <div class="modal-form__group" id="new-category-group-loss" style="display: none;">
                            <label class="modal-form__label">New Category Name</label>
                            <input type="text" name="new-category" id="new-category-loss" class="modal-form__input">
                        </div>

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="type" value="loss">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-close-modal" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-save-changes-modal">Add Expense</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="charts-section">
        <div class="chart-container">
            <h3 class="chart-container__title">Earnings Overview</h3>
            <div class="chart-container__content">
                <canvas id="earningsChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h3 class="chart-container__title">Monthly Expenses</h3>
            <div class="chart-container__content">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/home-sidebar.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/home.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
