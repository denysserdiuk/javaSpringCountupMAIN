<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CountUp</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-page">
    <div class="login-page__container">
        <div class="login-page__brand">
            <i class="fas fa-chart-line"></i> CountUp
        </div>

        <h2 class="login-page__heading">Welcome Back</h2>
        <p class="login-page__subheading">Enter your credentials to access your dashboard.</p>

        <form th:action="@{/login}" method="post" class="login-page__form">

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required class="login-page__input">
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="login-page__input">
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="login-error-message" th:if="${param.error}">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password.
            </div>

            <div class="login-page__options">
                <div class="login-page__remember-me">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>
                <a href="#" class="forgot-password-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-page__button login-page__button--submit">
                Sign In
            </button>

            <div class="login-page__divider">
                <span>Or continue with</span>
            </div>

            <div class="social-buttons">
                <button type="button" class="login-page__button login-page__button--google">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="login-page__button login-page__button--facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
            </div>
        </form>

        <div class="login-page__footer">
            Don't have an account? <a href="/register" class="login-page__link">Create an account</a>
        </div>
    </div>
</div>
</body>
</html>
