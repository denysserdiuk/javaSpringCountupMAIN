<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Portfolio - CountUp</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="/css/global.css" rel="stylesheet"/>
    <link href="/css/home-sidebar.css" rel="stylesheet"/>
    <link href="/css/home-main.css" rel="stylesheet"/>
    <link href="/css/shares.css" rel="stylesheet"/>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body id="page-top">

<div data-hx-trigger="load" data-hx-swap="outerHTML" data-hx-get="/home-sidebar"></div>

<div class="main">
    <header class="dashboard-header">
        <div>
            <div class="dashboard-header__title">Investment Portfolio</div>
            <h2 class="dashboard-header__current-month">My Assets</h2>
        </div>
    </header>

    <div class="window-container h-auto"> <div class="window-container__header">
        <h3 class="window-container__title">Stock Holdings</h3>
        <i class="fas fa-chart-pie text-muted"></i>
    </div>

        <div class="scrollable-list" style="max-height: 600px;">
            <table class="table">
                <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Shares</th>
                    <th>Purchase Date</th>
                    <th>Avg. Price</th>
                    <th>Current Price</th>
                    <th>P/L</th> </tr>
                </thead>
                <tbody id="shares-list">
                </tbody>
            </table>
        </div>

        <div class="window-container__footer">
            <button type="button" class="btn-add-item" data-bs-toggle="modal" data-bs-target="#add-share-modal">
                <i class="fas fa-plus"></i> Add New Stock
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="add-share-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New Position</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/addShare}" method="post" id="add-share">
                <div class="modal-body">
                    <div class="modal-form__group">
                        <label class="modal-form__label">Ticker Symbol</label>
                        <input type="text" name="ticker" class="modal-form__input" required placeholder="e.g. AAPL, TSLA" style="text-transform: uppercase;">
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <div class="modal-form__group">
                                <label class="modal-form__label">Quantity</label>
                                <input type="number" step="0.01" name="amount" class="modal-form__input" required placeholder="0">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="modal-form__group">
                                <label class="modal-form__label">Price per Share ($)</label>
                                <input type="number" step="0.01" name="price" class="modal-form__input" required placeholder="0.00">
                            </div>
                        </div>
                    </div>

                    <div class="modal-form__group">
                        <label class="modal-form__label">Purchase Date</label>
                        <input type="date" name="purchaseDate" class="modal-form__input" required>
                    </div>

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-close-modal" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-save-changes-modal">Add to Portfolio</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/home-sidebar.js"></script>
<script src="/js/shares.js"></script>

</body>
</html>
