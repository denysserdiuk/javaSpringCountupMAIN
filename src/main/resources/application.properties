spring.application.name=financeApp
spring.datasource.url=jdbc:mariadb://localhost:3306/financeapp

spring.config.import=optional:classpath:config.properties
# Database username and password
spring.datasource.username=root
spring.datasource.password=testest

# JDBC Driver class name
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

server.port=${PORT:8080}
# Pool configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

## Thymeleaf view files path
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

## Enable caching of views
spring.thymeleaf.cache=true

polygon.io.api.key=${SHARES}

telegram.bot.token=${TELEGRAM}

# GMAIL SMTP CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.protocol=smtps

spring.mail.username=${GMAIL_MAIN}
spring.mail.password=${GMAIL_MAIN_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtps.timeout=5000
spring.mail.properties.mail.smtps.connectiontimeout=5000

# Sender Email (Must match the username above exactly)
app.email.from=${GMAIL_MAIN}

